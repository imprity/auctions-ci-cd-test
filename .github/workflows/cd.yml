name: CD Pipeline

on:
  workflow_run:
    workflows: [ "CI-BASIC" ]
    types: [ completed ] # CI가 통과된 이후에 실행됩니다
    branches: [ main, dev ]

# OIDC 토큰 요청 권한
permissions:
  id-token: write   # OIDC 토큰 요청용
  contents: read    # 코드 체크아웃용

jobs:
  build:
    runs-on: ubuntu-latest
    if: github.event.workflow_run.conclusion == 'success'
    outputs:
      image_tag: ${{ steps.vars.outputs.short_sha }}

    steps:
      # 코드 가져오기
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      # 커밋 해시 추출
      - name: Set short SHA
        id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      # Java 17 설치
      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'corretto'

      # Gradle 캐시
      - name: Cache Gradle packages
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # JAR 빌드
      - name: Build JAR
        run: |
          chmod +x gradlew
          ./gradlew bootJar

      # AWS 자격증명 - OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # ECR 로그인
      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      # Docker 빌드 및 push
      - name: Build and push Docker image
        run: |
          SHORT_SHA=${{ steps.vars.outputs.short_sha }}
          IMAGE_URI=${{ vars.AWS_ACCOUNT_ID }}.dkr.ecr.${{ vars.AWS_REGION }}.amazonaws.com/${{ vars.ECR_REPOSITORY }}

          # Docker 빌드 및 push
          docker build --platform linux/arm64 -t $IMAGE_URI:$SHORT_SHA .
          docker push $IMAGE_URI:$SHORT_SHA

          echo "✅ Pushed: $IMAGE_URI:$SHORT_SHA"

  deploy:
    needs: build
    if: github.event.workflow_run.event == 'push'
    # 일단은 dev에서도 해보죠!
    # if: github.ref == 'refs/heads/main'   # main push에서만 배포 (PR에서는 CI만 실행)
    runs-on: ubuntu-latest

    steps:
      # AWS 자격증명 - OIDC
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      # 코드 가져오기 (네! 또 가져옵니다 :D)
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.workflow_run.head_branch }}

      # EC2 한테 docker pull 받아오라고 하기
      - name: Tell EC2 to pull from docker and run it
        env:
          IMAGE_TAG: ${{ needs.build.outputs.image_tag }}
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ vars.AWS_REGION }}
          ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY }}
          AWS_INSTANCE_ID: ${{ vars.AWS_INSTANCE_ID }}

        run: |
          set -euo pipefail

          ECR_URI="${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/${ECR_REPOSITORY}:${IMAGE_TAG}"

          COMPOSE_B64=$(base64 -w0 docker-compose.yml)

          cat > ssm-params.json <<JSON
          {
              "commands": [
                  "set -euo pipefail",
                  "docker version",
                  "cd /home/ec2-user/app",
                  "set +e",
                  "docker rm -v -f \$(docker ps -qa)",
                  "set -e",
                  "echo $COMPOSE_B64 | base64 -d - > docker-compose-prod.yml",
                  "docker pull \"$ECR_URI\"",
                  "ECR_URI=\"$ECR_URI\" docker compose up -d"
              ]
          }
          JSON

          COMMAND_ID=$(
              aws ssm send-command \
                  --region "$AWS_REGION" \
                  --instance-ids "$AWS_INSTANCE_ID" \
                  --document-name "AWS-RunShellScript" \
                  --comment "deploy auction spring server" \
                  --parameters file://ssm-params.json \
                  --query "Command.CommandId" \
                  --output text
              )

          echo "SSM CommandId: $COMMAND_ID"

          set +e
          aws ssm wait command-executed \
              --region "$AWS_REGION" \
              --command-id "$COMMAND_ID" \
              --instance-id "$AWS_INSTANCE_ID" \
              --cli-connect-timeout 180 \
              --cli-read-timeout 180
          COMMAND_RESULT=$?
          set -e

          aws ssm get-command-invocation \
              --region "$AWS_REGION" \
              --command-id "$COMMAND_ID" \
              --instance-id "$AWS_INSTANCE_ID" \
              --query "{Status:Status,ResponseCode:ResponseCode,Stdout:StandardOutputContent,Stderr:StandardErrorContent}" \
              --output json

          exit $COMMAND_RESULT

