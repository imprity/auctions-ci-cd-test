spring:
  application:
    name: auction

  profiles:
    include: oauth

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

  kafka:
    bootstrap-servers: ${KAFKA_HOST:localhost}:9092

  ai:
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      chat:
        options:
          model: ${OLLAMA_MODEL:llama3.2}
      embedding:
        options:
          model: nomic-embed-text # 텍스트 → 벡터 변환 전용 임베딩 모델 (RAG용)

jwt:
  secret:
    key: ${JWT_SECRET}
  accessExpire: 1800000
  refreshExpire: 604800000

scheduler:
  auction:
    delay: 60000  # 60초