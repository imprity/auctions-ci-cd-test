services:

  postgres:
    image: pgvector/pgvector:pg17
    container_name: auction-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DATABASE}
      POSTGRES_USER: ${POSTGRES_USERNAME}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "pg_isready", "-U", "${POSTGRES_USERNAME}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8.6.2
    container_name: auction-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:4.0.2
    container_name: auction-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    healthcheck:
      test: [ "CMD", "/opt/kafka/bin/kafka-topics.sh", "--bootstrap-server", "localhost:9092", "--list" ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: auction-kafka-ui
    ports:
      - "8999:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy

  redis-insight:
    image: redis/redisinsight:latest
    container_name: auction-redis-insight
    ports:
      - "5540:5540"
    depends_on:
      redis:
        condition: service_healthy

  app:
    build: .
    container_name: auction-app
    environment:
      OLLAMA_BASE_URL: http://auction-ollama:11434
      OLLAMA_MODEL: llama3.2
    depends_on:
      ollama:
        condition: service_healthy  # API 준비 완료 후 app 시작 (service_started → service_healthy)
      ollama-init:
        condition: service_completed_successfully  # 모델 pull 완료 후 app 시작

  ollama:
    image: ollama/ollama:latest
    container_name: auction-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    # API 준비 여부 확인 후 app이 연결하도록 healthcheck 추가
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  ollama-init:
    image: ollama/ollama:latest
    container_name: auction-ollama-init
    depends_on:
      ollama:
        condition: service_healthy  # ollama API 준비 완료 후 실행
    environment:
      OLLAMA_HOST: http://ollama:11434  # 같은 네트워크의 ollama 서비스로 연결
    command: >
      sh -c "ollama pull llama3.2 && ollama pull nomic-embed-text"
    restart: "no"  # 모델 pull 완료 후 종료, 재시작 없음

volumes:
  postgres-data:
  ollama-data: